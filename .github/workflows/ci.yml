name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - 'app-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-tests:
    name: Unit and dependency-free integration tests
    runs-on: ubuntu-22.04
    env:
      # CI intentionally avoids Docker, cloud credentials, and live datastore fixtures.
      DATAPADPLUSPLUS_FIXTURE_RUN: '0'
      RUST_BACKTRACE: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install workspace dependencies
        run: npm ci

      - name: Run deterministic CI checks
        run: npm run ci:test
