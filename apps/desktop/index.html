<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1219" />
    <title>DataPad++</title>
    <style>
      .initial-boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #1e1e1e;
        color: #cccccc;
        font: 14px 'Segoe UI', system-ui, sans-serif;
      }

      .initial-boot-card {
        width: min(420px, calc(100vw - 32px));
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 24px;
        border: 1px solid #3c3c3c;
        background: #202020;
      }

      .initial-boot-card img {
        width: min(260px, 70vw);
        height: auto;
        display: block;
      }

      .initial-boot-card p {
        margin: 0;
        color: #969696;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-boot" role="status" aria-live="polite">
        <div class="initial-boot-card">
          <img src="/logo_transparent.png" alt="DataPad++" />
          <p>Starting DataPad++...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
