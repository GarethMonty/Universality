services:
  postgres:
    image: postgres:16
    container_name: universality-postgres
    environment:
      POSTGRES_DB: universality
      POSTGRES_USER: universality
      POSTGRES_PASSWORD: universality
    ports:
      - '54329:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U universality -d universality']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  mysql:
    image: mysql:8.4
    container_name: universality-mysql
    environment:
      MYSQL_DATABASE: commerce
      MYSQL_USER: universality
      MYSQL_PASSWORD: universality
      MYSQL_ROOT_PASSWORD: universality-root
    ports:
      - '33060:3306'
    command: ['mysqld', '--default-authentication-plugin=mysql_native_password']
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-u', 'root', '-puniversality-root']
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: universality-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: Universality_pwd_123
    ports:
      - '14333:1433'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Universality_pwd_123' -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
    volumes:
      - ./sqlserver/init:/work:ro

  mongodb:
    image: mongo:7
    container_name: universality-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: universality
      MONGO_INITDB_ROOT_PASSWORD: universality
      MONGO_INITDB_DATABASE: catalog
    ports:
      - '27018:27017'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "mongosh --quiet --username universality --password universality --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
    volumes:
      - ./mongodb/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    container_name: universality-redis
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20
